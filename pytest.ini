[pytest] ; pytest 설정. 아래 내용은 pytest가 읽을 설정이다.
testpaths = tests 
; test 경로 지정
python_files = test_*.py ; 테스트 파일 규칙 설정
python_functions = test_* ; 테스트 함수 규칙 설정

markers =
    smoke: critical path sanity checks
    regression: broader functional regression coverage
    ; marker 정의

